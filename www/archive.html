<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--navy4);color:var(--text);font-family:'Cormorant Garamond',serif;
  display:flex;min-height:100vh;overflow-x:hidden}

/* ── SIDEBAR ── */
.sb{
  width:220px;min-width:220px;background:var(--navy);
  border-right:1px solid var(--border2);
  position:fixed;top:0;left:0;height:100vh;
  display:flex;flex-direction:column;z-index:300;
  transition:transform .3s ease;
}
.sb-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border2)}
.sb-logo a{text-decoration:none;display:block}
.sb-logo-text{font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:2px;color:var(--gold)}
.sb-logo-sub{font-size:11px;color:var(--text-d);margin-top:3px;font-style:italic}
.sb-nav{flex:1;overflow-y:auto;padding:12px 0}
.sb-link,.sb-btn{
  display:block;width:100%;padding:11px 24px;
  text-decoration:none;text-align:left;background:none;
  border:none;border-left:2px solid transparent;
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--text-b);
  cursor:pointer;transition:all .2s;box-sizing:border-box;
  line-height:1.4;
}
.sb-link:hover,.sb-btn:hover{color:var(--gold);border-left-color:var(--gold-d);background:rgba(201,164,58,0.04)}
.sb-link.on,.sb-btn.on{color:var(--gold);border-left-color:var(--gold);background:rgba(201,164,58,0.07)}
.sb-sub{display:none}
.sb-divider{height:1px;background:rgba(201,164,58,0.2);margin:8px 16px;}
.sb-foot{padding:20px 24px;border-top:1px solid var(--border2);margin-top:auto}
.sb-foot-date{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.5px;color:var(--text-b);line-height:2.1;font-weight:500}

/* ── MOBILE BAR ── */
.mob-bar{
  display:none;position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--navy);border-bottom:1px solid var(--border2);
  z-index:400;align-items:center;justify-content:space-between;padding:0 20px;
}
.mob-logo{font-family:'Cinzel',serif;font-size:12px;font-weight:600;
  letter-spacing:2px;color:var(--gold);text-decoration:none}
.mob-ham{background:none;border:none;cursor:pointer;
  padding:8px;display:flex;flex-direction:column;gap:5px}
.mob-ham span{display:block;width:22px;height:2px;background:var(--gold-d)}
.mob-overlay{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.7);z-index:290}

/* ── MAIN ── */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 32px;border-bottom:1px solid var(--border2);
  background:rgba(14,22,40,0.95);position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.tb-greeting{font-family:'Cinzel',serif;font-size:13px;font-weight:500;color:var(--text-b);letter-spacing:1px}
.tb-date{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-b);opacity:.9}

/* ── RESPONSIVE ── */
@media(max-width:860px){
  .mob-bar{display:flex}
  .sb{transform:translateX(-100%)}
  .sb.open{transform:translateX(0)}
  .mob-overlay.open{display:block}
  .main{margin-left:0!important;padding-top:52px}
  .topbar{padding:12px 16px}
  .body,.hero{padding-left:16px!important;padding-right:16px!important}
  .two-col{grid-template-columns:1fr!important}
  .cards-row{grid-template-columns:1fr!important}
}

:root{--navy:#0E1628;--navy2:#131D35;--navy4:#0A1020;--gold:#C9A43A;--gold-l:#E0BC5A;--gold-d:#8A6E20;--border:rgba(201,164,58,0.15);--border2:rgba(201,164,58,0.08);--text:#E2D0A8;--text-d:#A09070;--text-b:#F8EED4;--sb-w:220px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy4);color:var(--text);font-family:'Cormorant Garamond',serif;display:flex;min-height:100vh}


.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy4);color:var(--text);font-family:'Cormorant Garamond',serif;display:flex;min-height:100vh}


.main{margin-left:var(--sb-w);flex:1;display:flex;flex-direction:column}

.tb-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--text-b);letter-spacing:1px}
.tb-right{display:flex;gap:12px;align-items:center}
.tb-sub{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-b);opacity:0.9}

/* Filters */
.filter-bar{padding:18px 40px;border-bottom:1px solid var(--border2);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--text-d);margin-right:6px}
.fb{background:none;border:1px solid var(--border2);color:var(--text-d);font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;cursor:pointer;transition:all 0.2s}
.fb:hover{border-color:var(--gold-d);color:var(--text-b)}
.fb.on{border-color:var(--gold);color:var(--gold);background:rgba(201,164,58,0.08)}
.search-wrap{margin-left:auto}
.search-inp{background:var(--navy);border:1px solid var(--border2);color:var(--text-b);font-family:'Cormorant Garamond',serif;font-size:15px;padding:7px 14px;outline:none;width:220px;transition:border 0.2s}
.search-inp::placeholder{color:var(--text-d)}
.search-inp:focus{border-color:var(--gold-d)}

/* Grid */
.body{padding:28px 40px 80px;flex:1}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:var(--navy);border:1px solid var(--border2);overflow:hidden;cursor:pointer;transition:all 0.3s;text-decoration:none;display:block;animation:rise 0.4s ease both}
.card:hover{border-color:var(--gold-d);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.card-img{height:140px;background:var(--navy2);position:relative;overflow:hidden}
.card-img-fill{width:100%;height:100%;object-fit:cover;opacity:0.7}
.card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative}
.card-img-grad{position:absolute;inset:0;background:linear-gradient(135deg,var(--navy2),#1a1530,var(--navy));opacity:0.9}
.card-img-verse{position:absolute;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);text-align:center;padding:12px;line-height:1.6}
.card-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(to top,var(--navy),transparent)}
.card-body{padding:18px 18px 14px}
.card-date{font-family:'Cinzel',serif;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:8px}
.card-theme{font-family:'Cinzel',serif;font-size:clamp(13px,1.5vw,15px);font-weight:600;color:var(--text-b);line-height:1.35;margin-bottom:7px}
.card-quote{font-size:13px;font-style:italic;color:var(--text-d);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.card-foot{padding:10px 18px;border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.card-ref{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text-d)}
.card-arr{color:var(--text-d);transition:all 0.2s;font-size:14px}
.card:hover .card-arr{color:var(--gold);transform:translateX(3px)}

/* Pagination */
.pag{display:flex;justify-content:center;gap:8px;margin-top:32px;padding-top:24px;border-top:1px solid var(--border2)}
.pag-btn{background:none;border:1px solid var(--border2);color:var(--text-d);font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;cursor:pointer;transition:all 0.2s}
.pag-btn:hover{border-color:var(--gold-d);color:var(--gold-d)}
.pag-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(201,164,58,0.08)}
.pag-btn:disabled{opacity:0.25;cursor:default}

#loading{flex:1;display:flex;align-items:center;justify-content:center}
.load-t{font-family:'Cinzel',serif;font-size:9px;letter-spacing:6px;text-transform:uppercase;color:var(--text-d)}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){.topbar,.filter-bar{padding:14px 20px}.body{padding:20px 20px 60px}}


/* All nav items — identical font/size/padding */


  
  .sb.open{transform:translateX(0)}

  .main{margin-left:0 !important;padding-top:52px}

  .sb.open{transform:translateX(0);z-index:350}

}
</style>

<script>
const SB='https://mjphpctvuxmbjhmcscoj.supabase.co',KEY='sb_publishable_MDPfXyMjG0eadmvp7uoqdg_EHwj4Alm';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const now=new Date();
document.getElementById('sb-date').innerHTML=`${MONTHS[now.getMonth()]}<br>${now.getDate()}<br>${now.getFullYear()}`;
const PAGE=18;
let all=[],filtered=[],page=0,monthFilter='all',searchQ='';

async function load(){
  const r=await fetch(`${SB}/rest/v1/devotionals?select=month_day,theme,scripture_reference,quote_text,quote_author&order=month_day.asc`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
  all=await r.json();
  document.getElementById('loading').style.display='none';
  document.getElementById('body').style.display='block';
  applyFilters();
}

function applyFilters(){
  filtered=all.filter(d=>{
    const mok=monthFilter==='all'||d.month_day?.startsWith(monthFilter);
    const sq=searchQ.toLowerCase();
    const sok=!sq||(d.theme||'').toLowerCase().includes(sq)||(d.scripture_reference||'').toLowerCase().includes(sq)||(d.quote_author||'').toLowerCase().includes(sq);
    return mok&&sok;
  });
  page=0;renderPage();
}

function renderPage(){
  const start=page*PAGE,end=start+PAGE,slice=filtered.slice(start,end);
  document.getElementById('tb-count').textContent=`${filtered.length} Devotionals`;
  document.getElementById('grid').innerHTML=slice.map((d,i)=>{
    const[mm,dd]=d.month_day.split('-');
    const mName=MONTHS[parseInt(mm)-1];
    const delay=(i%PAGE*0.03).toFixed(2);
    return `<a class="card" href="index.html?date=${d.month_day}" style="animation-delay:${delay}s">
      <div class="card-img">
        <div class="card-img-placeholder">
          <div class="card-img-grad"></div>
          <div class="card-img-verse">${d.scripture_reference||''}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-date">${mName} ${parseInt(dd)}</div>
        <div class="card-theme">${d.theme||''}</div>
        <div class="card-quote">"${d.quote_text||''}"</div>
      </div>
      <div class="card-foot">
        <span class="card-ref">${d.scripture_reference?.split(' ').slice(0,3).join(' ')||''}</span>
        <span class="card-arr">→</span>
      </div>
    </a>`;
  }).join('');

  // Pagination
  const pages=Math.ceil(filtered.length/PAGE);
  let ph='';
  if(pages>1){
    ph+=`<button class="pag-btn" onclick="gp(page-1)" ${page===0?'disabled':''}>← Prev</button>`;
    for(let p=Math.max(0,page-2);p<=Math.min(pages-1,page+2);p++)
      ph+=`<button class="pag-btn ${p===page?'on':''}" onclick="gp(${p})">${p+1}</button>`;
    ph+=`<button class="pag-btn" onclick="gp(page+1)" ${page>=pages-1?'disabled':''}>Next →</button>`;
  }
  document.getElementById('pag').innerHTML=ph;
  window.scrollTo({top:0,behavior:'smooth'});
}

function gp(p){if(p>=0&&p<Math.ceil(filtered.length/PAGE)){page=p;renderPage()}}
function setMonth(m,btn){monthFilter=m;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyFilters()}
function doSearch(){searchQ=document.getElementById('search').value;applyFilters()}
load();

  if(el) el.innerHTML=DAYS[now.getDay()]+'<br>'+MON[now.getMonth()]+' '+now.getDate()+'<br>'+now.getFullYear();
  // auto-expand study if on learn page
})();

var _so=false;
function sbStudy(){
  _so=!_so;
  var s=document.getElementById('study-sub');
  var b=document.getElementById('study-btn');
  if(s) s.style.display=_so?'block':'none';
  if(b){b.style.color=_so?'var(--gold)':'';b.style.borderLeftColor=_so?'var(--gold-d)':'';b.style.background=_so?'rgba(201,164,58,0.04)':'';}
}
function sbStudyExpand(){
  _so=true;
  var s=document.getElementById('study-sub');
  var b=document.getElementById('study-btn');
  if(s) s.style.display='block';
  if(b){b.style.color='var(--gold)';b.style.borderLeftColor='var(--gold-d)';b.style.background='rgba(201,164,58,0.04)';}
}
function sbOpen(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mob-overlay').classList.add('open');
}
function sbClose(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('open');
}
(function(){
  var DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MON=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var now=new Date();
  var el=document.getElementById('sb-date');
  if(el) el.innerHTML=DAYS[now.getDay()]+'<br>'+MON[now.getMonth()]+' '+now.getDate()+'<br>'+now.getFullYear();
  if(window.location.pathname.indexOf('learn.html')!==-1) sbStudyExpand();
})();

</script>
