<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--navy4);color:var(--text);font-family:'Cormorant Garamond',serif;
  display:flex;min-height:100vh;overflow-x:hidden}

/* ── SIDEBAR ── */
.sb{
  width:220px;min-width:220px;background:var(--navy);
  border-right:1px solid var(--border2);
  position:fixed;top:0;left:0;height:100vh;
  display:flex;flex-direction:column;z-index:300;
  transition:transform .3s ease;
}
.sb-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border2)}
.sb-logo a{text-decoration:none;display:block}
.sb-logo-text{font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:2px;color:var(--gold)}
.sb-logo-sub{font-size:11px;color:var(--text-d);margin-top:3px;font-style:italic}
.sb-nav{flex:1;overflow-y:auto;padding:12px 0}
.sb-link,.sb-btn{
  display:block;width:100%;padding:11px 24px;
  text-decoration:none;text-align:left;background:none;
  border:none;border-left:2px solid transparent;
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--text-b);
  cursor:pointer;transition:all .2s;box-sizing:border-box;
  line-height:1.4;
}
.sb-link:hover,.sb-btn:hover{color:var(--gold);border-left-color:var(--gold-d);background:rgba(201,164,58,0.04)}
.sb-link.on,.sb-btn.on{color:var(--gold);border-left-color:var(--gold);background:rgba(201,164,58,0.07)}
.sb-sub{display:none}
.sb-divider{height:1px;background:rgba(201,164,58,0.2);margin:8px 16px;}
.sb-foot{padding:20px 24px;border-top:1px solid var(--border2);margin-top:auto}
.sb-foot-date{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.5px;color:var(--text-b);line-height:2.1;font-weight:500}

/* ── MOBILE BAR ── */
.mob-bar{
  display:none;position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--navy);border-bottom:1px solid var(--border2);
  z-index:400;align-items:center;justify-content:space-between;padding:0 20px;
}
.mob-logo{font-family:'Cinzel',serif;font-size:12px;font-weight:600;
  letter-spacing:2px;color:var(--gold);text-decoration:none}
.mob-ham{background:none;border:none;cursor:pointer;
  padding:8px;display:flex;flex-direction:column;gap:5px}
.mob-ham span{display:block;width:22px;height:2px;background:var(--gold-d)}
.mob-overlay{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.7);z-index:290}

/* ── MAIN ── */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 32px;border-bottom:1px solid var(--border2);
  background:rgba(14,22,40,0.95);position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.tb-greeting{font-family:'Cinzel',serif;font-size:13px;font-weight:500;color:var(--text-b);letter-spacing:1px}
.tb-date{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-b);opacity:.9}

/* ── RESPONSIVE ── */
@media(max-width:860px){
  .mob-bar{display:flex}
  .sb{transform:translateX(-100%)}
  .sb.open{transform:translateX(0)}
  .mob-overlay.open{display:block}
  .main{margin-left:0!important;padding-top:52px}
  .topbar{padding:12px 16px}
  .body,.hero{padding-left:16px!important;padding-right:16px!important}
  .two-col{grid-template-columns:1fr!important}
  .cards-row{grid-template-columns:1fr!important}
}

.page-hero{padding:52px 48px 44px;border-bottom:1px solid var(--border2);background:var(--navy);position:relative;overflow:hidden}
.page-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 100% at 50% 100%,rgba(201,164,58,0.04),transparent)}
.ph-eyebrow{font-family:'Cinzel',serif;font-size:8px;letter-spacing:6px;text-transform:uppercase;color:var(--gold-d);margin-bottom:14px}
.ph-title{font-family:'Cinzel',serif;font-size:clamp(22px,3vw,30px);font-weight:600;color:var(--text-b);letter-spacing:2px;margin-bottom:14px}
.ph-desc{font-size:17px;font-style:italic;color:var(--text-d);max-width:560px;line-height:1.8}

.body{padding:40px 48px 80px}



#loading{flex:1;display:flex;align-items:center;justify-content:center}
.load-t{font-family:'Cinzel',serif;font-size:9px;letter-spacing:6px;text-transform:uppercase;color:var(--text-d)}

.tlist{display:flex;flex-direction:column;gap:0;max-width:760px;margin:0 auto;padding:32px 0 80px}
.tlist-item{
  display:flex;align-items:center;gap:20px;
  padding:18px 24px;text-decoration:none;
  border-bottom:1px solid var(--border2);
  transition:all .2s;border-left:3px solid transparent;
}
.tlist-item:first-child{border-top:1px solid var(--border2)}
.tlist-item:hover{background:var(--navy2);border-left-color:var(--gold);padding-left:28px}
.tlist-num{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--gold-d);min-width:28px}
.tlist-name{font-family:'Cinzel',serif;font-size:14px;font-weight:500;color:var(--text-b);flex:1;letter-spacing:1px}
.tlist-sub{font-size:13px;font-style:italic;color:var(--text-d);min-width:180px;text-align:right}
.tlist-arr{font-size:14px;color:var(--gold-d);margin-left:16px;transition:all .2s}
.tlist-item:hover .tlist-arr{color:var(--gold);transform:translateX(4px)}
@media(max-width:600px){
  .tlist{padding:16px 0 60px}
  .tlist-item{padding:16px 16px;gap:12px}
  .tlist-sub{display:none}
  .tlist-item:hover{padding-left:20px}
}

<script>
const SB='https://mjphpctvuxmbjhmcscoj.supabase.co',KEY='sb_publishable_MDPfXyMjG0eadmvp7uoqdg_EHwj4Alm';
const now=new Date();const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('sb-date').innerHTML=`${DAYS[now.getDay()]}<br>${MONTHS[now.getMonth()]} ${now.getDate()}<br>${now.getFullYear()}`;
async function load(){
  const r=await fetch(`${SB}/rest/v1/topics?select=*&order=sort_order.asc`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
  const topics=(await r.json()).filter(t=>t.slug!=='the-sabbath');
  document.getElementById('loading').style.display='none';
  document.getElementById('body').style.display='block';
  document.getElementById('grid').innerHTML=topics.map((t,i)=>`
    <a class="tlist-item" href="learn.html?topic=${t.slug}">
      <span class="tlist-num">${String(i+1).padStart(2,'0')}</span>
      <span class="tlist-name">${t.title}</span>
      <span class="tlist-sub">${t.subtitle}</span>
      <span class="tlist-arr">→</span>
    </a>`).join('');
}
load().catch(console.error);

/* ── Sidebar JS ── */
var _so=false;
function sbStudy(){
  _so=!_so;
  var s=document.getElementById('study-sub');
  var b=document.getElementById('study-btn');
  if(s) s.style.display=_so?'block':'none';
  if(b){b.style.color=_so?'var(--gold)':'';b.style.borderLeftColor=_so?'var(--gold-d)':'';b.style.background=_so?'rgba(201,164,58,0.04)':'';}
}
function sbStudyExpand(){
  _so=true;
  var s=document.getElementById('study-sub');
  var b=document.getElementById('study-btn');
  if(s) s.style.display='block';
  if(b){b.style.color='var(--gold)';b.style.borderLeftColor='var(--gold-d)';b.style.background='rgba(201,164,58,0.04)';}
}
function sbOpen(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mob-overlay').classList.add('open');
}
function sbClose(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('open');
}
(function(){
  var DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MON=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var now=new Date();
  var el=document.getElementById('sb-date');
  if(el) el.innerHTML=DAYS[now.getDay()]+'<br>'+MON[now.getMonth()]+' '+now.getDate()+'<br>'+now.getFullYear();
  if(window.location.pathname.indexOf('learn.html')!==-1) sbStudyExpand();
})();

</script>
