<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Devotion — Grace for Every Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0E1628;--navy2:#131D35;--navy3:#1A2540;--navy4:#0A1020;
  --gold:#C9A43A;--gold-l:#E0BC5A;--gold-d:#8A6E20;--amber:#D4862A;
  --border:rgba(201,164,58,0.15);--border2:rgba(201,164,58,0.08);
  --text:#E2D0A8;--text-d:#A09070;--text-b:#F8EED4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--navy4);color:var(--text);font-family:'Cormorant Garamond',serif;
  display:flex;min-height:100vh;overflow-x:hidden}

/* ── SIDEBAR ── */
.sb{
  width:220px;min-width:220px;background:var(--navy);
  border-right:1px solid var(--border2);
  position:fixed;top:0;left:0;height:100vh;
  display:flex;flex-direction:column;z-index:300;
  transition:transform .3s ease;
}
.sb-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border2)}
.sb-logo a{text-decoration:none;display:block}
.sb-logo-text{font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:2px;color:var(--gold)}
.sb-logo-sub{font-size:11px;color:var(--text-d);margin-top:3px;font-style:italic}
.sb-nav{flex:1;overflow-y:auto;padding:12px 0}
.sb-link,.sb-btn{
  display:block;width:100%;padding:11px 24px;
  text-decoration:none;text-align:left;background:none;
  border:none;border-left:2px solid transparent;
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--text-b);
  cursor:pointer;transition:all .2s;box-sizing:border-box;
  line-height:1.4;
}
.sb-link:hover,.sb-btn:hover{color:var(--gold);border-left-color:var(--gold-d);background:rgba(201,164,58,0.04)}
.sb-link.on,.sb-btn.on{color:var(--gold);border-left-color:var(--gold);background:rgba(201,164,58,0.07)}
.sb-sub{display:none}
.sb-divider{height:1px;background:rgba(201,164,58,0.2);margin:8px 16px;}
.sb-foot{padding:20px 24px;border-top:1px solid var(--border2);margin-top:auto}
.sb-foot-date{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.5px;color:var(--text-b);line-height:2.1;font-weight:500}

/* ── MOBILE BAR ── */
.mob-bar{
  display:none;position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--navy);border-bottom:1px solid var(--border2);
  z-index:400;align-items:center;justify-content:space-between;padding:0 20px;
}
.mob-logo{font-family:'Cinzel',serif;font-size:12px;font-weight:600;
  letter-spacing:2px;color:var(--gold);text-decoration:none}
.mob-ham{background:none;border:none;cursor:pointer;
  padding:8px;display:flex;flex-direction:column;gap:5px}
.mob-ham span{display:block;width:22px;height:2px;background:var(--gold-d)}
.mob-overlay{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.7);z-index:290}

/* ── MAIN ── */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 32px;border-bottom:1px solid var(--border2);
  background:rgba(14,22,40,0.95);position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.tb-greeting{font-family:'Cinzel',serif;font-size:13px;font-weight:500;color:var(--text-b);letter-spacing:1px}
.tb-date{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-b);opacity:.9}

/* ── RESPONSIVE ── */
@media(max-width:860px){
  .mob-bar{display:flex}
  .sb{transform:translateX(-100%)}
  .sb.open{transform:translateX(0)}
  .mob-overlay.open{display:block}
  .main{margin-left:0!important;padding-top:52px}
  .topbar{padding:12px 16px}
  .body,.hero{padding-left:16px!important;padding-right:16px!important}
  .two-col{grid-template-columns:1fr!important}
  .cards-row{grid-template-columns:1fr!important}
}
/* ── HERO ── */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,var(--navy2) 0%,var(--navy) 50%,#0A1525 100%);
  border-bottom:1px solid var(--border2);
  padding:72px 80px 64px;text-align:center;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 50% -10%,rgba(201,164,58,.08) 0%,transparent 60%);
  pointer-events:none;
}
.hero-eyebrow{font-family:'Cinzel',serif;font-size:8px;letter-spacing:6px;text-transform:uppercase;color:var(--gold-d);margin-bottom:28px;opacity:.8}
.flame{width:48px;height:64px;margin:0 auto 24px;position:relative}
.flame-body{width:16px;height:36px;background:linear-gradient(to top,var(--gold),var(--gold-l));margin:28px auto 0;border-radius:2px;position:relative}
.flame-flame{
  width:22px;height:28px;
  background:linear-gradient(to top,var(--amber),var(--gold-l),#fff8e0);
  border-radius:50% 50% 30% 30%/60% 60% 40% 40%;
  position:absolute;top:-26px;left:-3px;
  animation:flicker 2.5s ease-in-out infinite;
  box-shadow:0 0 16px rgba(212,134,42,.6),0 0 32px rgba(201,164,58,.3);
}
.flame-glow{
  position:absolute;top:-30px;left:-16px;width:54px;height:54px;
  background:radial-gradient(circle,rgba(212,134,42,.25) 0%,transparent 70%);
  animation:flicker 2.5s ease-in-out infinite reverse;
}
@keyframes flicker{
  0%,100%{transform:scaleX(1) rotate(-1deg);opacity:1}
  33%{transform:scaleX(1.08) rotate(1.5deg);opacity:.9}
  66%{transform:scaleX(.95) rotate(-.5deg);opacity:.95}
}
.hero-quote{max-width:700px;margin:0 auto 28px;animation:fadeUp .8s ease both}
.hero-quote-text{font-size:clamp(20px,3vw,30px);font-weight:300;font-style:italic;color:var(--text-b);line-height:1.7}
.hero-quote-by{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-top:14px}
.hero-theme{font-family:'Cinzel',serif;font-size:clamp(12px,1.5vw,16px);font-weight:500;color:#C0A870;margin:24px 0 36px;letter-spacing:1px}
.hero-cta{
  display:inline-block;border:1px solid var(--gold);color:var(--gold);
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:5px;text-transform:uppercase;
  padding:14px 52px;text-decoration:none;transition:all .3s;
  background:rgba(201,164,58,.06);
}
.hero-cta:hover{background:var(--gold);color:var(--navy4);box-shadow:0 0 24px rgba(201,164,58,.25)}
.cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border2)}
.card{background:var(--navy);padding:24px 28px;border-top:1px solid var(--border2)}
.card-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold-d);margin-bottom:10px}
.card-body{font-size:clamp(13px,1.5vw,15px);line-height:1.75;color:#E2D0A8}
.card-body strong{color:var(--text-b);font-weight:500;display:block;margin-bottom:6px;font-style:italic}
.body{padding:48px 80px 80px;background:var(--navy4)}
.two-col{display:grid;grid-template-columns:1fr 300px;gap:28px}
.med-block{background:var(--navy);border:1px solid var(--border2);padding:40px;margin-bottom:22px}
.block-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold-d);margin-bottom:18px}
.med-title{font-family:'Cinzel',serif;font-size:clamp(17px,2vw,22px);font-weight:600;color:var(--text-b);line-height:1.4;margin-bottom:24px}
.med-body p{font-size:clamp(16px,1.8vw,19px);line-height:2;color:var(--text);margin-bottom:18px}
.qbar{border-left:2px solid var(--gold-d);padding:20px 28px;background:rgba(201,164,58,.04);margin:28px 0}
.qbar-t{font-size:18px;font-style:italic;color:var(--text-b);line-height:1.7}
.qbar-by{font-family:'Cinzel',serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);margin-top:10px}
.src-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
.src-tag{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border:1px solid var(--border);color:#E2D0A8}
.orn{display:flex;align-items:center;gap:14px;margin:24px 0;opacity:.2}
.orn-l{flex:1;height:1px;background:var(--gold)}
.orn-s{color:var(--gold);font-size:8px;letter-spacing:6px}
.call-block{background:#1A2848;border:1px solid rgba(201,164,58,0.2);border-top:2px solid var(--gold-d);padding:28px 32px;margin-bottom:20px;text-align:center}
.call-text{font-family:'Cinzel',serif;font-size:clamp(12px,1.5vw,15px);font-weight:600;color:#F5E6C0;line-height:1.9}
.pray-block{background:#162038;border:1px solid rgba(201,164,58,0.15);padding:32px;margin-bottom:20px;text-align:center}
.pray-text{font-size:clamp(16px,1.8vw,20px);font-style:italic;font-weight:300;color:#F0E0B8;line-height:2}
.scripture-close{background:var(--navy2);border:1px solid var(--border2);border-top:1px solid var(--gold);padding:40px 36px;text-align:center}
.sc-verse{font-size:clamp(18px,2.5vw,27px);font-style:italic;font-weight:300;color:var(--text-b);line-height:1.75;margin-bottom:16px}
.sc-ref{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:var(--gold);font-weight:500;text-transform:uppercase}
.sp{background:var(--navy);border:1px solid var(--border2);padding:24px;margin-bottom:16px}
.sp-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:18px}
.sp-q{padding:16px 0;border-bottom:1px solid var(--border2)}
.sp-q:first-child{padding-top:0}
.sp-q:last-child{border-bottom:none;padding-bottom:0}
.sp-qt{font-family:'Cinzel',serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);margin-bottom:8px}
.sp-qtxt{font-size:clamp(14px,1.5vw,16px);font-style:italic;font-weight:300;color:var(--text-b);line-height:1.65}
.sp-link{display:block;padding:10px 0;border-bottom:1px solid var(--border2);font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#C0A870;text-decoration:none;transition:color .2s}
.sp-link:last-child{border-bottom:none}
.sp-link:hover{color:var(--gold)}
#loading{flex:1;display:flex;align-items:center;justify-content:center;padding:100px}
.load-t{font-family:'Cinzel',serif;font-size:9px;letter-spacing:6px;text-transform:uppercase;color:#E2D0A8}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:860px){
  .hero{padding:48px 20px 40px}
  .body{padding:24px 16px 60px}
  .hero-cta{padding:12px 32px}
}
</style>
<script src="native.js" defer></script>
<style id="readability-overrides">
/* v1.1 — readability bump for accessibility / small-screen comfort */
.hero-eyebrow,
.scripture-header,
.verse-ref,
.tp-name,
.sb-sub-link,
.sb-logo-sub,
.block-lbl,
.card-lbl,
.qbar-by,
.hero-quote-by,
.toggle-sub,
.field-lbl,
.sec-title,
.footer-sub,
.load-t { font-size: 13px !important; }

.sb-logo-text,
.mob-logo,
.toggle-lbl,
.field-icon { font-size: 15px !important; }

.hero-quote-text,
.qbar-t,
.sc-verse,
.med-body p,
.card-body,
.call-text,
.pray-text,
.sp-qtxt { font-size: 17px !important; line-height: 1.7 !important; }

.med-body p,
.call-text,
.pray-text { letter-spacing: 0.2px; }

.hero-cta,
.sp-link,
.btn-primary { font-size: 14px !important; padding: 12px 22px !important; }

.hero-title,
.med-title { letter-spacing: 0.5px !important; }

/* Body text on detail pages */
body, .main, p { font-size: 16px; }

/* iOS Dynamic Type respect — let users scale further if they need it */
@supports (font: -apple-system-body) {
  html { -webkit-text-size-adjust: 100%; }
}
</style>
</head>

<div class="mob-bar">

  <button class="mob-ham" onclick="sbOpen()" aria-label="Menu"><span></span><span></span><span></span></button>
</div>
<div class="mob-overlay" id="mob-overlay" onclick="sbClose()"></div>
<aside class="sb" id="sidebar">
  <div class="sb-logo">
    <a href="index.html">
      <div class="sb-logo-text">Grace</div>
      <div class="sb-logo-sub">Daily Scripture &amp; Reflection</div>
    </a>
  </div>
  <nav class="sb-nav">

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="tb-greeting" id="greeting"></div>
    <div class="tb-date" id="topdate"></div>
  </div>
  <div id="loading"><span class="load-t">Preparing today's word</span></div>
  <div id="app" style="display:none;flex:1;flex-direction:column"></div>
</main>

<script>
if(!localStorage.getItem('tew_onboarded')){localStorage.setItem('tew_onboarded','1');}
const SB='https://mjphpctvuxmbjhmcscoj.supabase.co',KEY='sb_publishable_MDPfXyMjG0eadmvp7uoqdg_EHwj4Alm';
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const GREET=['Midnight','Early Morning','Early Morning','Dawn','Dawn','Morning','Morning','Morning','Morning','Morning','Morning','Morning','Midday','Afternoon','Afternoon','Afternoon','Afternoon','Afternoon','Evening','Evening','Evening','Evening','Night','Night'];
const now=new Date();
const mm=String(now.getMonth()+1).padStart(2,'0'),dd=String(now.getDate()).padStart(2,'0');
document.getElementById('greeting').textContent=`Good ${GREET[now.getHours()]}`;
document.getElementById('topdate').textContent=`${DAYS[now.getDay()]} · ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
document.getElementById('sb-date').innerHTML=`${DAYS[now.getDay()]}<br>${MONTHS[now.getMonth()]} ${now.getDate()}<br>${now.getFullYear()}`;

async function init(){
  // Use GraceNative.localDateKey() so it matches the cached/notification keys
  const todayKey = (window.GraceNative && window.GraceNative.localDateKey) ? window.GraceNative.localDateKey() : `${mm}-${dd}`;
  let d = null;
  let fromCache = false;

  // Try network first
  try{
    const r=await fetch(`${SB}/rest/v1/devotionals?month_day=eq.${todayKey}&select=*&limit=1`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
    if(r.ok){
      const rows=await r.json();
      if(rows && rows.length){
        d=rows[0];
        // Cache for offline next time
        if(window.GraceNative && window.GraceNative.cacheDevotion){
          window.GraceNative.cacheDevotion(todayKey, d);
        }
      }
    }
  }catch(_){}

  // Fall back to offline cache if network failed
  if(!d && window.GraceNative && window.GraceNative.getCachedDevotion){
    d = await window.GraceNative.getCachedDevotion(todayKey);
    if(d) fromCache = true;
  }

  if(!d) throw new Error('no-data');

  const paras=d.meditation.split(/\n\n|\n/).filter(p=>p.trim()).map(p=>`<p>${p.trim()}</p>`).join('');
  const srcs=(d.sources||[]).map(s=>`<span class="src-tag">${s}</span>`).join('');
  const qs=(d.reflection_questions||[]).map(q=>`<div class="sp-q"><div class="sp-qt">${q.topic}</div><div class="sp-qtxt">${q.question}</div></div>`).join('');

  document.getElementById('loading').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex';
  app.innerHTML=`
    <!-- Hero -->
    <div class="hero">
      <div class="hero-eyebrow">${DAYS[now.getDay()]} · ${MONTHS[now.getMonth()]} ${now.getDate()}${fromCache?' · Offline':''}</div>
      <div class="flame">
        <div class="flame-glow"></div>
        <div class="flame-flame"></div>
        <div class="flame-body"></div>
      </div>
      <div class="hero-quote">
        <div class="hero-quote-text">"${d.quote_text}"</div>
        <div class="hero-quote-by">— ${d.quote_author}</div>
      </div>
      <div class="hero-theme">${d.theme}</div>
      <a href="#reading" class="hero-cta">Begin Reading</a>
      <div class="native-actions" id="nativeActions" style="display:none;margin-top:18px;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="hero-cta" id="btnListenDevotion" style="background:transparent;border:1px solid currentColor">▶ Listen</button>
        <button class="hero-cta" id="btnSaveDevotion" style="background:transparent;border:1px solid currentColor">♥ Save</button>
        <button class="hero-cta" id="btnShareDevotion" style="background:transparent;border:1px solid currentColor">↗ Share</button>
      </div>
    </div>

    <!-- 3 Cards -->
    <div class="cards-row">
      <div class="card">
        <div class="card-lbl">Today's Scripture</div>
        <div class="card-body"><strong>${d.scripture_reference}</strong>${d.scripture_text}</div>
      </div>
      <div class="card">
        <div class="card-lbl">Theme</div>
        <div class="card-body"><strong>${d.theme}</strong>A meditation for today's journey.</div>
      </div>
      <div class="card">
        <div class="card-lbl">Sources</div>
        <div class="card-body">${(d.sources||[]).join(' · ')}</div>
      </div>
    </div>

    <!-- Body -->
    <div class="body" id="reading">
      <div class="two-col">
        <div>
          <div class="med-block">
            <div class="block-lbl">Meditation</div>
            <div class="med-title">${d.theme}</div>
            <div class="qbar">
              <div class="qbar-t">"${d.quote_text}"</div>
              <div class="qbar-by">— ${d.quote_author}</div>
            </div>
            <div class="med-body">${paras}</div>
            <div class="src-row">${srcs}</div>
          </div>
          <div class="orn"><div class="orn-l"></div><span class="orn-s">· · ·</span><div class="orn-l"></div></div>
          <div class="call-block">
            <div class="block-lbl">Today's Call</div>
            <div class="call-text">${d.call_to_action}</div>
          </div>
          <div class="pray-block">
            <div class="block-lbl">Closing Prayer</div>
            <div class="pray-text">${d.prayer}</div>
          </div>
          <div class="scripture-close">
            <div class="block-lbl">Today's Scripture</div>
            <div class="sc-verse">"${d.scripture_text}"</div>
            <div class="sc-ref">${d.scripture_reference}</div>
          </div>
        </div>
        <div>
          <div class="sp"><div class="sp-lbl">Reflection</div>${qs}</div>
          <div class="sp">
            <div class="sp-lbl">Study Deeper</div>
            <a class="sp-link" href="topics.html">All Eleven Topics</a>
            <a class="sp-link" href="learn.html?topic=the-cross">The Cross</a>
            <a class="sp-link" href="learn.html?topic=discipleship">Discipleship</a>
            <a class="sp-link" href="learn.html?topic=holiness-of-god">Holiness of God</a>
            <a class="sp-link" href="learn.html?topic=prayer">Prayer</a>
          </div>
        </div>
      </div>
    </div>`;

  // Wire native action bar after render
  if(window.GraceNative && window.GraceNative.isNative){
    const bar=document.getElementById('nativeActions');
    if(bar) bar.style.display='flex';
    const listenBtn=document.getElementById('btnListenDevotion');
    const saveBtn=document.getElementById('btnSaveDevotion');
    const shareBtn=document.getElementById('btnShareDevotion');

    // Listen — native speech synthesis
    let speaking=false;
    if(listenBtn){
      const audio = window.GraceNative.audio;
      audio.onState((state)=>{
        if(state==='playing'){ speaking=true; listenBtn.textContent='■ Stop'; }
        else { speaking=false; listenBtn.textContent='▶ Listen'; }
      });
      listenBtn.addEventListener('click',()=>{
        if(speaking){ audio.stop(); return; }
        const script = [
          'Today\'s devotion. ' + (d.theme || ''),
          'Scripture: ' + (d.scripture_reference || '') + '. ' + (d.scripture_text || ''),
          'Quote from ' + (d.quote_author || '') + '. ' + (d.quote_text || ''),
          d.meditation || '',
          'Today\'s call. ' + (d.call_to_action || ''),
          'Closing prayer. ' + (d.prayer || ''),
          'Amen.'
        ].filter(Boolean).join(' ');
        audio.speak(script);
      });
    }

    // Save — Capacitor Preferences
    if(saveBtn){
      const key='dev:'+todayKey;
      window.GraceNative.listFavorites().then((list)=>{
        if(list.find((x)=>x.key===key)) saveBtn.textContent='♥ Saved';
      });
      saveBtn.addEventListener('click',()=>{
        window.GraceNative.addFavorite(key,{theme:d.theme,scripture:d.scripture_reference,date:todayKey});
        saveBtn.textContent='♥ Saved';
      });
    }

    // Share — system share sheet
    if(shareBtn){
      shareBtn.addEventListener('click',()=>{
        window.GraceNative.share({
          title:'Grace for Every Day — '+(d.theme||"Today's Devotion"),
          text:'"'+d.quote_text+'" — '+d.quote_author+'\n\n'+d.scripture_reference+': '+d.scripture_text,
          url:'https://graceforevery.day/devotion.html'
        });
      });
    }
  }
}
init().catch(()=>{
  document.getElementById('loading').innerHTML='<span class="load-t">Rest in His presence today</span>';
});

var _so=false;
function sbStudy(){
  _so=!_so;
  var s=document.getElementById('study-sub');
  var b=document.getElementById('study-btn');
  if(s) s.style.display=_so?'block':'none';
  if(b){b.style.color=_so?'var(--gold)':'';b.style.borderLeftColor=_so?'var(--gold-d)':'';b.style.background=_so?'rgba(201,164,58,0.04)':'';}
}
function sbStudyExpand(){
  _so=true;
  var s=document.getElementById('study-sub');
  var b=document.getElementById('study-btn');
  if(s) s.style.display='block';
  if(b){b.style.color='var(--gold)';b.style.borderLeftColor='var(--gold-d)';b.style.background='rgba(201,164,58,0.04)';}
}
function sbOpen(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mob-overlay').classList.add('open');
}
function sbClose(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('open');
}
(function(){
  var DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MON=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var now=new Date();
  var el=document.getElementById('sb-date');
  if(el) el.innerHTML=DAYS[now.getDay()]+'<br>'+MON[now.getMonth()]+' '+now.getDate()+'<br>'+now.getFullYear();
  if(window.location.pathname.indexOf('learn.html')!==-1) sbStudyExpand();
  // Auto-open from landing page
  if(new URLSearchParams(window.location.search).get('study')==='open'){
    sbOpen();
    sbStudyExpand();
    // Highlight Study Topics, remove highlight from Daily Devotion
    var dailyLink = document.querySelector('.sb-link.on');
    if(dailyLink) dailyLink.classList.remove('on');
    var studyBtn = document.getElementById('study-btn');
    if(studyBtn) studyBtn.classList.add('on');
  }
})();
