name: Build iOS App

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]
    paths: ['capacitor.config.json', 'ios/**', 'www/**']

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
      
      - name: Sync Capacitor
        run: npx cap sync ios
      
      - name: Build iOS
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Grace.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            archive
      
      - name: Create unsigned IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r $RUNNER_TEMP/Grace.xcarchive/Products/Applications/App.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r Grace.ipa Payload
          
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grace-iOS
          path: ${{ runner.temp }}/Grace.ipa

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install dependencies
        run: npm install
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Build Android
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Grace-Android-APK
          path: android/app/build/outputs/apk/release/app-release.apk
      
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Grace-Android-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
