name: Build Grace App (Android + iOS)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm install
      - run: npx cap add android
      - run: npx cap sync android
      - name: Build APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: Grace-Android-APK
          path: android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx cap add ios
      - run: npx cap sync ios
      - name: Build iOS Archive
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Grace.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            archive
      - name: Create IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r $RUNNER_TEMP/Grace.xcarchive/Products/Applications/App.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP && zip -r Grace.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: Grace-iOS-IPA
          path: ${{ runner.temp }}/Grace.ipa
