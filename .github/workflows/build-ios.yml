name: Build & Upload iOS App

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Setup API key
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_KEY_P8" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Install Fastlane
        run: gem install fastlane

      - name: Create Fastfile
        working-directory: ios/App
        run: |
          mkdir -p fastlane
          cat > fastlane/Fastfile << 'FAST'
          default_platform(:ios)
          platform :ios do
            lane :release do
              setup_ci
              api_key = app_store_connect_api_key(
                key_id: ENV["APP_STORE_CONNECT_KEY_ID"],
                issuer_id: ENV["APP_STORE_CONNECT_ISSUER_ID"],
                key_filepath: File.expand_path("~/private_keys/AuthKey_#{ENV['APP_STORE_CONNECT_KEY_ID']}.p8"),
                in_house: false
              )
              # Auto-create certificate and profile
              cert(api_key: api_key)
              sigh(
                api_key: api_key,
                app_identifier: "day.graceforevery.app",
                force: true
              )
              update_code_signing_settings(
                use_automatic_signing: false,
                path: "App.xcodeproj",
                team_id: "XT323ZDS6N",
                bundle_identifier: "day.graceforevery.app",
                profile_name: lane_context[SharedValues::SIGH_NAME]
              )
              build_app(
                workspace: "App.xcworkspace",
                scheme: "App",
                export_method: "app-store",
                output_directory: "./build",
                output_name: "Grace.ipa"
              )
              upload_to_testflight(
                api_key: api_key,
                skip_waiting_for_build_processing: true
              )
            end
          end
          FAST

      - name: Build and upload
        working-directory: ios/App
        run: fastlane release

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Grace-iOS-IPA
          path: ios/App/build/Grace.ipa
          if-no-files-found: ignore
